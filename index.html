<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深渊电竞</title>

  <style>
	body { margin:0; font-family: Arial, sans-serif; background:#0a0a0f; color:#fff; }

	header { background:#111; padding:20px; text-align:center; position:relative; }
	header h1 { margin:0; color:#00e5ff; }

	nav { display:flex; justify-content:center; gap:20px; margin-top:10px; }
	nav a { color:#ccc; text-decoration:none; }
	nav a:hover { color:#00e5ff; }

	.settings-btn {
	  position:absolute;
	  top:20px;
	  right:20px;
	  font-size:20px;
	  color:#ccc;
	  text-decoration:none;
	}

	.hero { text-align:center; padding:60px 20px; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); }

	.services { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:40px; }
	.card { background:#111; padding:20px; border-radius:10px; }

	.service-btn {
	  display:block;
	  padding:15px;
	  background:#00e5ff;
	  color:#000;
	  text-align:center;
	  border-radius:8px;
	  text-decoration:none;
	  font-weight:bold;
	}

	footer { text-align:center; padding:20px; background:#000; color:#666; }
  </style>
</head>

<body>

<header>
  <h1>深渊电竞</h1>
  <nav>
	<a href="#">首页</a>
	<a href="#services">服务</a>
  </nav>
</header>

<section class="hero">
  <h2>你的上分捷径</h2>
</section>

<section id="services" class="services">
  <div class="card"><a href="Boost.html" class="service-btn">代打服务</a></div>
  <div class="card"><a href="Trade.html" class="service-btn">账号买卖</a></div>
  <div class="card"><a href="Duo.html" class="service-btn">陪玩服务</a></div>
</section>

<footer>
  <p>© 2026 深渊电竞</p>
</footer>

</body>
</html>
